service: day13-observability-lab
version: "1.0"
owner: team-oncall

slos:
  - name: latency_p95
    description: "95th percentile latency must stay below threshold"
    sli: latency_p95_ms
    target: 0.95
    window: 28d
    threshold_ms: 3000
    error_budget: 0.05
    burn_rate_alert: 14.4  # 1h window → budget consumed in ~1.7 days

  - name: error_rate
    description: "Error rate must stay below 2%"
    sli: error_rate_pct
    target: 0.98
    window: 28d
    threshold: 0.02
    error_budget: 0.02
    burn_rate_alert: 14.4

  - name: cost_budget
    description: "Daily LLM cost must not exceed budget"
    sli: daily_cost_usd
    target: 1.0
    window: 1d
    budget_usd: 2.5
    error_budget: 0.0
    burn_rate_alert: 1.5  # alert when spending 1.5x normal rate

  - name: quality_score
    description: "Average response quality score above threshold"
    sli: quality_score_avg
    target: 0.95
    window: 28d
    threshold: 0.75
    error_budget: 0.05
    burn_rate_alert: 14.4
